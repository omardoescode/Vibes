spring.application.name=Vibes
server.port=${BACKEND_PORT}
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

storage.provider=s3
spring.servlet.multipart.max-file-size=60MB

# Session cookie hardening
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
# Persist the session cookie across browser restarts (7 days)
server.servlet.session.cookie.max-age=604800
server.servlet.session.timeout=7d

# Serialize LocalDateTime as ISO-8601 strings instead of arrays
spring.jackson.datatype.datetime.WRITE_DATES_AS_TIMESTAMPS=false

# OAuth Configuration
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# GitHub OAuth2
oauth.github.client-id=${GITHUB_CLIENT_ID}
oauth.github.client-secret=${GITHUB_CLIENT_SECRET}
oauth.github.redirect-uri=${OAUTH_REDIRECT_BASE_URL:http://localhost:8080}/auth/oauth/github/callback
oauth.github.authorization-uri=https://github.com/login/oauth/authorize
oauth.github.token-uri=https://github.com/login/oauth/access_token
oauth.github.user-info-uri=https://api.github.com/user
oauth.github.scope=user:email,read:user

